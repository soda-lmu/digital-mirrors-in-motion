<!DOCTYPE html>
<!-- Image Pose Analysis: upload image → MediaPipe pose detection → cluster matching -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Analysis - Digital Mirrors in Motion</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Global Navigation -->
        <nav class="global-nav">
            <a href="index.html" class="nav-home">🪞 Digital Mirrors in Motion</a>
            <div class="nav-tools">
                <a href="image.html" class="nav-tool active">📷 Image</a>
                <a href="video.html" class="nav-tool">🎬 Video</a>
                <a href="patterns.html" class="nav-tool">📊 Database</a>
            </div>
        </nav>

        <header class="page-header">
            <h1>📷 Image Pose Analysis</h1>
            <p class="page-subtitle">Upload an image to detect poses and analyze gender patterns</p>
        </header>

        <div class="image-layout">
            <!-- Left: Upload & Preview -->
            <div class="preview-panel">
                <div class="upload-area">
                    <button id="uploadBtn" class="btn btn-primary btn-large">📷 Upload Image</button>
                    <button id="clearBtn" class="btn" style="display: none;">🗑️ Clear</button>
                    <input type="file" id="imageInput" accept="image/*" hidden>
                    
                    <select id="exampleSelect" class="btn" style="display: none; background: var(--surface); color: var(--light); border: 1px solid var(--surface-light); margin-left: 10px;">
                        <option value="">📷 Select from Examples</option>
                    </select>
                </div>

                <div id="uploadPlaceholder" class="upload-placeholder">
                    <div class="placeholder-content">
                        <span class="placeholder-icon">📷</span>
                        <p>Upload an image to detect poses</p>
                        <p class="placeholder-hint">Supports JPG, PNG, WebP</p>
                    </div>
                </div>

                <div id="previewArea" class="preview-area" style="display: none;">
                    <canvas id="previewCanvas" width="500" height="600"></canvas>
                </div>
            </div>

            <!-- Right: Analysis Results -->
            <div class="analysis-panel">
                <div class="card">
                    <h2>📖 How it works</h2>
                    <div id="matchingClusters" class="matching-clusters">
                        <!-- Filled by updateMatchingClusters -->
                    </div>
                </div>

                <div class="card">
                    <h2>Pose Pattern</h2>
                    <div id="patternContent" class="pattern-content">
                        <p class="placeholder-text">Upload an image to see pose analysis</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="image.js"></script>
</body>

</html>
